# -------------- Settings --------------
PageName: Alchemy Redone
PageDesc: Version 1.3.0

# -------------- Main Block --------------
MainSettingsName: Main Settings

SettingModEnabled: Enable Mod
SettingModEnabledDesc: |-
  Enable or disable the mod.
  Need to load a save for changes to take effect.

SettingShowFullEffectInfo: Show full effect info
SettingShowFullEffectInfoDesc: Created Effects block will show effect info with magnitudes and durations as affected by your skills and tools.

SettingPotionArtUsesSkill: Potion Look Depends On Skill
SettingPotionArtUsesSkillDesc: |-
  If enabled, potion look will be selected based on your effective {color_header}Alchemy{color_normal} skill (including bonuses from {color_header}Intelligence{color_normal} and {color_header}Luck{color_normal} attributes).
  Otherwise potion look is selected like in vanilla - randomly.

SettingPrefixPotionNames: Prefix Potion Names
SettingPrefixPotionNamesDesc: If enabled then default potion names will have prefix in front of the effect name.

SettingPotionNamePrefixGood: Prefix For Potions
SettingPotionNamePrefixGoodDesc: Will be added in front of effect name when brewing potion.

SettingPotionNamePrefixBad: Prefix For Poisons
SettingPotionNamePrefixBadDesc: Will be added in front of effect name when brewing poison.

SettingIngredientEffectMatchingAll: Ingredient Effect Filter Always Matching 
SettingIngredientEffectMatchingAllDesc: |-
  If enabled, then when ingredient list is filtered by Matching effects, all matching effects will be considered, even ones not learned yet.
  Removes some tedium, since you already can test any 2 ingredients if they have matching effects by adding them to potion.

# -------------- Nearby Block --------------

NearbyGroupTitle: External Inventory Search & Use
NearbySettingsName: "Allow Nearby Apparatus & Ingredients"
NearbySettingsDesc: |-
  Enables use of apparatus placed in-world and ingredients from nearby containers.
  If disabled, only apparatus and ingredients from your inventory can be used and you can't use apparatus placed in-world - they will be picked up on activate.

SettingAllowOwnedApparatus: "Owned - All Apparatus, Not Theft"
SettingAllowOwnedApparatusDesc: If set to true, apparatus owned by others can be used regardless of ownership. Apparatus is used in place, never taken, so this is not theft.

SettingAllowFactionOwned: "Owned - Faction Member, Not Theft"
SettingAllowFactionOwnedDesc: If set to true, containers and apparatus owned by a faction you belong to count as yours when your rank permits. Using them is not theft.

SettingAllowOwnedContainerIngredients: "Owned - Container Ingredients, {color_negative}Theft, Stealing{color_normal}"
SettingAllowOwnedContainerIngredientsDesc: If set to true, ingredients from containers where taking would be stealing are allowed. No crime is recorded.

SettingAllowCorpseIngredients: "Corpse - Dead Bodies"
SettingAllowCorpseIngredientsDesc: If set to true, you will be able to use ingredients from dead bodies.

Apparatus_Hint_Use: |-
  Activate to Use
  Sneak to Take
Apparatus_Hint_Take: |-
  Activate to Take
  Stand up to Use

# -------------- Rework Block --------------
ReworkSettingsName: Reworked Effect Discovery
ReworkSettingsDesc: |-
  Changes:
  - Alchemy skill does not grant potion effect knowledge
  - Drinking any potion reveals all of its effects
  - Store-bought potions with positive effects will show all positive effects
  - Store-bough potions without positive effects will show all effects
  - Self-brewed potions will show effects that are known from at least 1 ingredient
  - Every N successfully brewed potions with same ingredients will reveal next unknown effect
  - Ingredients still reveal effects with Alchemy skill levels, but slower
  - Ingredients reveal next effect above skill limit when consumed
  - Ingredients also reveal all known effects from brewed potion
  
  Makes sense only if you have {color_header}Inventory Extender{color_normal} installed - otherwise tooltips will show effects in vanilla way.

SettingReworkEnabled: Enable
SettingReworkEnabledDesc: Enables reworked effect discovery.

SettingUseBaseAlchemyForKnowledge: Use Base Alchemy For Knowledge
SettingUseBaseAlchemyForKnowledgeDesc: If enabled, then base level of alchemy (without bonuses and penalties) will be used for known effect count.

SettingPotionKnowledgeThreshold: New effect discovery threshold
SettingPotionKnowledgeThresholdDesc: |-
  How many potions you need to brew to learn new effect.
  Range [{color_header}{min}{color_normal} - {color_header}{max}{color_normal}], default is {color_header}{default}{color_normal}.

SettingIngredientKnowledgeThreshold: Ingredient Effect Discovery Threshold
SettingIngredientKnowledgeThresholdDesc: |-
  Your {color_header}Alchemy{color_normal} skill is divided by this number and rounded down to determine how many ingredient effects you can see by default.
  Range [{color_header}{min}{color_normal} - {color_header}{max}{color_normal}], default is {color_header}{default}{color_normal}. Vanilla value is {color_header}15{color_normal}.

SettingIngredientMaxTaste: Ingredient Max Tasted Effects
SettingIngredientMaxTasteDesc: |-
  You can consume ingredients to reveal next possible effect according to your {color_header}Alchemy{color_normal} skill.
  This setting determines how many effects at max you can learn this way.
  Range [{color_header}{min}{color_normal} - {color_header}{max}{color_normal}], default is {color_header}{default}{color_normal}.
  Set to {color_header}0{color_normal} to effectively disable this mechanic.

# -------------- Interface Block --------------
InterfaceSettingsName: Interface

SettingIntReMode: Interface Reimagined Support

InterfaceReimaginedMode_Auto: "Auto"
InterfaceReimaginedMode_On: " On "
InterfaceReimaginedMode_Off: "Off "

SettingCompactMode: Compact Mode
SettingCompactModeDesc: |-
  Makes the window smaller.
  Can be wonky if brewed potion has more than 4 effects, unless resized manually.

SettingNumberSeparators: Show thousand separators
ConfigNumberSeparators_None: None
ConfigNumberSeparators_Comma: Comma
ConfigNumberSeparators_Space: Space

SettingTextSize: Text Size
SettingTextSizeDesc: |-
  Override text size. Set to {color_header}0{color_normal} to use default size.
  Range is [{color_header}{min}{color_normal} - {color_header}{max}{color_normal}], default is {color_header}{default}{color_normal}.

SettingShowUseHint: Show Usage Hint
SettingShowUseHintDesc: If enabled, will show tooltip with info about how to use or pickup apparatus when you look at it.

# -------------- Controller Block --------------
ControllerSettingsName: Controller Settings
ControllerSettingsDesc: |-
  Click on a binding to change it.
  Backspace to clear binding.

SettingController_Activate: Activate
SettingController_ActivateDesc: |-
  Should be bound to same key as 'click-imitating' input.
  In ingredient list:
  - Adds ingredient to the recipe.
  In effect list:
  - Sets effect as a filter and switches to ingredient list.
  - If {color_header}LT{color_normal} is held - adds effect to filter.
  - If {color_header}RT{color_normal} is held - marks effect as favorite.

SettingController_Brew: Brew Potion
SettingController_BrewDesc: Brew potion from currently selected ingredients.

SettingController_ClearText: Clear
SettingController_ClearTextDesc: |-
  Clears ingredient filter text and any selected effects.
  If {color_header}LT{color_normal} is held - clear selected ingredients instead.

SettingController_ToggleType: Toggle Potion Type
SettingController_ToggleTypeDesc: Toggle between brewing Potions and Poisons.

SettingController_ToggleTable: Toggle Between Ingredients and Effects
SettingController_ToggleTableDesc: |-
  Toggle between showing ingredient list and effect list.
  If {color_header}LT{color_normal} is held - toggle {color_header}Matching{color_normal} filter.

SettingController_CountMore: Increase Potion Count
SettingController_CountMoreDesc: |-
  Increases potion count by {color_header}1{color_normal}.
  If {color_header}LT{color_normal} is held - increases by {color_header}5{color_normal}.
  If {color_header}RT{color_normal} is held - sets count to {color_header}100{color_normal}.

SettingController_CountLess: Decrease Potion Count
SettingController_CountLessDesc: |-
  Decreases potion count by {color_header}1{color_normal}.
  If {color_header}LT{color_normal} is held - decreases by {color_header}5{color_normal}.
  If {color_header}RT{color_normal} is held - sets count to {color_header}1{color_normal}.

SettingController_SelectNext: Select Next
SettingController_SelectNextDesc: |-
  Selects next item down the list.
  If at the bottom - loops to the start.
  If {color_header}LT{color_normal} is held - skip by 5 items forward.
  If {color_header}RT{color_normal} is held - skip full page forward.

SettingController_SelectPrev: Select Previous
SettingController_SelectPrevDesc: |-
  Selects previous item up the list.
  If at the top - loops to the bottom.
  If {color_header}LT{color_normal} is held - skip by 5 items backward.
  If {color_header}RT{color_normal} is held - skip full page backward.

SettingAllowPrecisionMode: Precision Mode
SettingAllowPrecisionModeDesc: If enabled, holding {color_header}LT{color_normal} while alchemy window is open will slow down cursor speed.

SettingRepeatingButtons: Repeating Buttons
SettingRepeatingButtonsDesc: Allows to repeatedly trigger potion count and item selection buttons while held.

SettingRepeatingButtonsThreshold: Repeat Threshold
SettingRepeatingButtonsThresholdDesc: |-
  How long (in seconds) to hold the button until repetition starts.
  Should not be lower than Repeat Interval.
  Range is [{color_header}{min}{color_normal} - {color_header}{max}{color_normal}], default is {color_header}{default}{color_normal} seconds.

SettingRepeatingButtonsStep: Repeat Interval
SettingRepeatingButtonsStepDesc: |-
  How often (in seconds) button actions repeat.
  Should not be higher than Repeat Threshold.
  Range is [{color_header}{min}{color_normal} - {color_header}{max}{color_normal}], default is {color_header}{default}{color_normal} seconds.