  Positive effects:
  {color_header}Retort{color_normal} {color_positive}increases{color_normal} strength and duration.
  
  Harmful effects:
  {color_header}Alembic{color_normal} {color_negative}decreases{color_normal} strength and duration.

AlchemyWindow_Type_Poison_Tooltip: |-
  Harmful effects:
  {color_header}Retort{color_normal} {color_positive}increases{color_normal} strength and duration.
  
  Positive effects:
  {color_header}Alembic{color_normal} {color_negative}decreases{color_normal} strength and duration.

Label_Potion: Potion
Label_Poison: Poison
Label_Matching: Matching

AlchemyWindow_Type_Ingredient_Tooltip: |-
  List of available ingredients.
  Click on an ingredient to add to (or remove from) the potion.

AlchemyWindow_Type_Effect_Tooltip: |-
  List of available effects.
  Click on an effect to set it as a filter.
  Hold {color_header}SHIFT{color_normal} or {color_header}LT{color_normal} to select multiple effects.
  Hold {color_header}CTRL{color_normal} or {color_header}RT{color_normal} to mark effect as favorite.

AlchemyWindow_Toggle_Matching_Ingredient_Tooltip: |-
  If enabled then only ingredients that have effects that are present in selected ingredients, but not yet matched will be shown.

AlchemyWindow_Toggle_Matching_Effect_Tooltip: |-
  If enabled then only positive effects are shown when brewing potion.
  And only harmful effects are shown when brewing poison.

TipNameReset: Reset name to default
TipFilterReset: Clear filter text
TipClearSelected: Clear selected ingredients
FilterPlaceholder: Filter ingredients...

All_Effects_Neutralized: All matching effects were neutralized by Alembic
