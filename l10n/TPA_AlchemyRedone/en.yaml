# -------------- Settings --------------
PageName: Alchemy Redone
PageDesc: Version 0.5

# -------------- Main Block --------------
MainSettingsName: Main Settings

SettingModEnabled: Enable Mod
SettingModEnabledDesc: |-
  Enable or disable the mod.
  Need to load a save for changes to take effect.

SettingShowFullEffectInfo: Show full effect info
SettingShowFullEffectInfoDesc: Created Effects block will show effect info with magnitudes and durations as affected by your skills and tools.

SettingAllowOwnedContainerIngredients: Allow ingredients from owned containers
SettingAllowOwnedContainerIngredientsDesc: If set to true, you will be able to use ingredients from containers that are owned by others.

SettingAllowCorpseIngredients: Allow ingredients from dead bodies
SettingAllowCorpseIngredientsDesc: If set to true, you will be able to use ingredients from dead bodies.

# -------------- Rework Block --------------
ReworkSettingsName: Reworked Effect Discovery
ReworkSettingsDesc: "Changes:\n
  - Alchemy skill does not grant potion effect knowledge\n
  - Drinking any potion reveals all of its effects\n
  - Store-bought potions with positive effects will show all positive effects\n
  - Store-bough potions without positive effects will show all effects\n
  - Self-brewed potions will show effects that are known from at least 1 ingredient\n
  - Every N successfully brewed potions with same ingredents will reveal next unknown effect\n
  - Ingredients still reveal effects with Alchemy skill levels\n
  - Ingredients also reveal all known effects from brewed potion\n
  \n
  Makes sense only if you have Inventory Extender installed - otherwise tooltips will show effects in vanilla way."

SettingReworkEnabled: Enable
SettingSettingReworkEnabledDesc: Enables reworked effect discovery.

# -------------- Interface Block --------------
InterfaceSettingsName: Interface

SettingIntReMode: Interface Reimagined Support

InterfaceReimaginedMode_Auto: "Auto"
InterfaceReimaginedMode_On: " On "
InterfaceReimaginedMode_Off: "Off "

SettingPotionKnowledgeThreshold: New effect discovery threshold
SettingPotionKnowledgeThresholdDesc: "How many potions you need to brew to learn new effect.\nRange [1-20], default is 5."

# -------------- Controller Block --------------
ControllerSettingsName: Controller Settings
ControllerSettingsDesc: |-
  Click on a binding to change it.
  Backspace to clear binding.

SettingController_Activate: Activate
SettingController_ActivateDesc: |-
  Selects currently highlighted ingredient.
  Should be bound to same key as 'click-imitating' input.

SettingController_Brew: Brew Potion
SettingController_BrewDesc: Brew potion from currently selected ingredients.

SettingController_ToggleType: Toggle Potion Type
SettingController_ToggleTypeDesc: Toggle between brewing Potions and Poisons.

SettingController_CountMore: Increase Potion Count
SettingController_CountMoreDesc: |-
  Increases potion count by 1.
  If LT is held - increases by 5.
  If RT is held - sets count to 100.

SettingController_CountLess: Decrease Potion Count
SettingController_CountLessDesc: |-
  Decreases potion count by 1.
  If LT is held - decreases by 5.
  If RT is held - sets count to 1.

SettingController_SelectNext: Select Next Ingredient
SettingController_SelectNextDesc: |-
  Selects next ingredient down the list. If at the bottom - loops to the start.
  If LT is held - skip by 5 ingredients forward.
  If RT is held - skip full page forward.

SettingController_SelectPrev: Select Previous Ingredient
SettingController_SelectPrevDesc: |-
  Selects previous ingredient up the list. If at the top - loops to the bottom.
  If LT is held - skip by 5 ingredients backward.
  If RT is held - skip full page backward.

SettingRepeatingButtons: Repeating Buttons
SettingRepeatingButtonsDesc: Allows to repeatedly trigger potion count and ingredient selection buttons while held.

SettingRepeatingButtonsThreshold: Repeat Threshold
SettingRepeatingButtonsThresholdDesc: |-
  How long (in seconds) to hold the button until repetition starts.
  Should not be lower than Repeat Interval.
  Range is [0.2-1], default is 0.5 seconds.

SettingRepeatingButtonsStep: Repeat Interval
SettingRepeatingButtonsStepDesc: |-
  How often (in seconds) button actions repeat.
  Should not be higher than Repeat Threshold.
  Range is [0.05-0.5], default is 0.125 seconds.